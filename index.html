<!-- ICU DRUG CONSOLE v0.6 CLEAN BUILD -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU Drug Console</title>

<style>
body {
  background:#060d1a;
  color:#e2e8f0;
  font-family: monospace;
  padding:20px;
}

.card {
  border:1px solid #1e293b;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  cursor:pointer;
}

.card.open {
  border-color:#00e0ff;
  box-shadow:0 0 12px rgba(0,224,255,0.2);
}

.slider {
  width:100%;
}

.result {
  margin-top:10px;
  font-size:18px;
  color:#00e0ff;
}
</style>
</head>

<body>

<h2>ICU Drug Console</h2>

<input type="number" id="weight" placeholder="Enter weight (kg)" />

<div id="app"></div>

<script>

const drugs = [
  {
    name:"Norepinephrine",
    doseDefault:0.1,
    doseMin:0.01,
    doseMax:3,
    conc:80
  },
  {
    name:"Dopamine",
    doseDefault:5,
    doseMin:1,
    doseMax:20,
    conc:4000
  }
];

let openCard = null;
let sliderState = {};

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  drugs.forEach((drug,i) => {
    const card = document.createElement("div");
    card.className = "card";

    if(openCard === drug.name) card.classList.add("open");

    const dose = sliderState[drug.name] ?? drug.doseDefault;
    const weight = document.getElementById("weight").value;

    let mlhr = "";
    if(weight) {
      mlhr = ((dose * weight * 60)/drug.conc).toFixed(2);
    }

    card.innerHTML = `
      <b>${drug.name}</b>
      ${openCard === drug.name ? `
        <br><br>
        <input type="range"
          class="slider"
          min="${drug.doseMin}"
          max="${drug.doseMax}"
          step="0.01"
          value="${dose}"
          oninput="update(${i},'${drug.name}',${drug.conc})">

        <div>Dose: <span id="dose-${i}">${dose}</span></div>

        <div class="result" id="result-${i}">
          ${weight ? mlhr + " ml/hr" : "Enter weight"}
        </div>
      `:""}
    `;

    card.onclick = (e) => {
      if(e.target.tagName === "INPUT") return;
      openCard = openCard === drug.name ? null : drug.name;
      render();
    };

    app.appendChild(card);
  });
}

function update(i,name,conc) {
  const slider = document.querySelectorAll(".slider")[i];
  const val = slider.value;

  sliderState[name] = val;

  document.getElementById("dose-"+i).innerText = val;

  const weight = document.getElementById("weight").value;

  if(weight) {
    const mlhr = ((val * weight * 60)/conc).toFixed(2);
    document.getElementById("result-"+i).innerText = mlhr + " ml/hr";
  }
}

render();

</script>

</body>
</html>
