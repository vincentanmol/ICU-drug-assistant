<!-- ICU DRUG CONSOLE v0.6 CLEAN BUILD -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU Drug Console</title>
  <style>
    input {
  background:#020617;
  border:1px solid #1e293b;
  color:#e2e8f0;
  padding:8px;
  border-radius:6px;
}
    input[type=range] {
  width: 100%;
  appearance: none;
  height: 6px;
  background: #1e293b;
  border-radius: 4px;
  outline: none;
}

/* track glow */
input[type=range]::-webkit-slider-runnable-track {
  height: 6px;
  background: linear-gradient(to right, #00e0ff, #0ea5e9);
  border-radius: 4px;
}

/* thumb */
input[type=range]::-webkit-slider-thumb {
  appearance: none;
  height: 16px;
  width: 16px;
  background: #00e0ff;
  border-radius: 50%;
  margin-top: -5px;
  box-shadow: 0 0 10px rgba(0,224,255,0.8);
  cursor: pointer;
}

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617 80%);
  color: #e2e8f0;
  font-family: monospace;
  padding: 20px;
}
    
.card {
  border:1px solid #1e293b;
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  background: rgba(15,23,42,0.75);
  backdrop-filter: blur(8px);
  transition:0.2s;
}

.card.open {
  border-color:#00e0ff;
  box-shadow:0 0 20px rgba(0,224,255,0.25);
  animation: pulseGlow 2s infinite;
}

.slider {
  width:100%;
}
    input[type=range] {
  width: 100%;
  accent-color: #00e0ff;
  cursor: pointer;
}

.result {
  margin-top:12px;
  font-size:26px;
  color:#00e0ff;
  font-weight:bold;
  letter-spacing:1px;

  text-shadow: 0 0 10px rgba(0,224,255,0.8);

  animation: monitorFlicker 1.5s infinite;
}
    @keyframes pulseGlow {
  0% {
    box-shadow: 0 0 6px rgba(0,224,255,0.4);
  }
  50% {
    box-shadow: 0 0 16px rgba(0,224,255,0.9);
  }
  100% {
    box-shadow: 0 0 6px rgba(0,224,255,0.4);
  }
}

@keyframes monitorFlicker {
  0% { opacity: 1; }
  48% { opacity: 1; }
  50% { opacity: 0.85; }
  52% { opacity: 1; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<h2 style="color:#00e0ff; letter-spacing:2px;">
  ICU DRUG CONSOLE v0.6
</h2>

<input type="number" id="weight" placeholder="Enter weight (kg)" />

<div id="app"></div>
  <div id="totalPanel" style="
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  background: rgba(15,23,42,0.75);
  border:1px solid #1e293b;
  color:#00e0ff;
  font-size:22px;
  text-shadow:0 0 8px rgba(0,224,255,0.6);
">
  Total Flow: 0 ml/hr
</div>

<script>

const drugs = [
  {
    name:"Norepinephrine",
    doseDefault:0.1,
    doseMin:0.01,
    doseMax:3,
    conc:80
  },
  {
    name:"Dopamine",
    doseDefault:5,
    doseMin:1,
    doseMax:20,
    conc:4000
  }
];

let openCards = [];
let sliderState = {};
let totalFlow = 0;
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  drugs.forEach((drug,i) => {
    const card = document.createElement("div");
    card.className = "card";

   if(openCards.includes(drug.name)) card.classList.add("open");

    const dose = sliderState[drug.name] ?? drug.doseDefault;
    const weight = document.getElementById("weight").value;

    let mlhr = "";
    if(weight) {
  mlhr = ((dose * weight * 60)/drug.conc).toFixed(2);
}
    card.innerHTML = `
      <b>${drug.name}</b>
    ${openCards.includes(drug.name) ? `
        <br><br>
        <input type="range"
          class="slider"
          min="${drug.doseMin}"
          max="${drug.doseMax}"
          step="0.01"
          value="${dose}"
          oninput="update(${i},'${drug.name}',${drug.conc})">
          <div style="display:flex; justify-content:space-between; font-size:11px; color:#64748b;">
  <span>${drug.doseMin}</span>
  <span>${dose}</span>
  <span>${drug.doseMax}</span>
</div>

        <div>Dose: <span id="dose-${i}">${dose}</span></div>

        <div class="result" id="result-${i}">
          ${weight ? mlhr + " ml/hr" : "Enter weight"}
        </div>
      `:""}
    `;

    card.onclick = (e) => {
  if(e.target.tagName === "INPUT") return;

  if(openCards.includes(drug.name)) {
    openCards = openCards.filter(d => d !== drug.name);
  } else {
    openCards.push(drug.name);
  }

  render();
      document.getElementById("totalPanel").innerText =
  "Total Flow: " + totalFlow.toFixed(2) + " ml/hr";
};

    app.appendChild(card);
  });
}

function update(i,name,conc) {

  const slider = document.querySelectorAll(".slider")[i];
  const val = slider.value;

  const drug = drugs[i]; // 👈 ADD THIS

  sliderState[name] = val;

  document.getElementById("dose-"+i).innerText = val;

  // 🔥 COLOR LOGIC
  let color = "#00e0ff";

  if (val > drug.doseMax * 0.7) {
    color = "#facc15";
  }

  if (val > drug.doseMax * 0.9) {
    color = "#ff3b3b";
  }

  document.getElementById("dose-"+i).style.color = color;

  const weight = document.getElementById("weight").value;

  if(weight) {
    const mlhr = ((val * weight * 60)/conc).toFixed(2);
    document.getElementById("result-"+i).innerText = mlhr + " ml/hr";
  }
}

render();

</script>

</body>
</html>
