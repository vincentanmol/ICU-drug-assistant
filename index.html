<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU Drug Assistant</title>

<style>
body {
  background: #020617;
  color: #e2e8f0;
  font-family: system-ui;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #0f172a;
  border: 1px solid #1e293b;
  color: white;
}

.card {
  background: #0f172a;
  border: 1px solid #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.card:hover {
  border-color: #00e0ff;
}

.hidden { display: none; }

.label { color: #64748b; font-size: 12px; }

.calc {
  margin-top: 10px;
  padding: 10px;
  background: #020617;
  border-radius: 6px;
}

button {
  background: #00e0ff;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  margin-top: 5px;
}
</style>

</head>

<body>

<h1>ICU Drug Assistant</h1>

<input type="number" id="weight" placeholder="Enter weight (kg)">

<input type="text" id="search" placeholder="Search drug...">

<h2>BMI Calculator</h2>
<input type="number" id="height" placeholder="Height (cm)">
<button onclick="calcBMI()">Calculate BMI</button>
<div id="bmiResult"></div>

<div id="app"></div>

<script>
const drugs = [
{
name: "Norepinephrine",
what: "Vasopressor",
when: "Septic shock, hypotension",
prep: "4 mg in 50 ml NS (80 mcg/ml)",
dose: 0.1,
watch: "MAP ≥65, cold extremities"
},
{
name: "Dopamine",
what: "Inotrope",
when: "Shock, low BP",
prep: "200 mg in 50 ml",
dose: 5,
watch: "Tachycardia"
},
{
name: "Dobutamine",
what: "Inotrope",
when: "Heart failure",
prep: "250 mg in 50 ml",
dose: 5,
watch: "BP drop"
},
{
name: "Adrenaline",
what: "Vasopressor",
when: "Cardiac arrest, shock",
prep: "1 mg in 50 ml",
dose: 0.1,
watch: "Arrhythmias"
}
];

const app = document.getElementById("app");
const search = document.getElementById("search");

function render(list) {
  app.innerHTML = "";
  list.forEach(drug => {
    const card = document.createElement("div");
    card.className = "card";

    const details = document.createElement("div");
    details.className = "hidden";

    details.innerHTML = `
      <div><b>${drug.name}</b></div>
      <div class="label">What:</div> ${drug.what}
      <div class="label">When:</div> ${drug.when}
      <div class="label">Prep:</div> ${drug.prep}
      <div class="label">Dose:</div> ${drug.dose} mcg/kg/min
      <div class="label">Watch:</div> ${drug.watch}

      <div class="calc">
        <button onclick="calculate('${drug.name}')">Calculate Dose</button>
        <div id="calc-${drug.name}"></div>
      </div>
    `;

    card.innerHTML = `<b>${drug.name}</b>`;
    card.onclick = () => details.classList.toggle("hidden");

    card.appendChild(details);
    app.appendChild(card);
  });
}

function calculate(name) {
  const weight = document.getElementById("weight").value;
  if (!weight) return alert("Enter weight");

  const drug = drugs.find(d => d.name === name);
  const result = (drug.dose * weight).toFixed(2);

  document.getElementById("calc-" + name).innerHTML =
    `Infusion: ${result} mcg/min`;
}

function calcBMI() {
  const h = document.getElementById("height").value / 100;
  const w = document.getElementById("weight").value;
  const bmi = (w / (h*h)).toFixed(2);
  document.getElementById("bmiResult").innerText = "BMI: " + bmi;
}

search.addEventListener("input", () => {
  const val = search.value.toLowerCase();
  render(drugs.filter(d => d.name.toLowerCase().includes(val)));
});

render(drugs);
</script>

</body>
</html>
